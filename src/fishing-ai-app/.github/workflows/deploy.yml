name: Deploy Fishing AI App

# ─────────────────────────────────────────────
# トリガー設定
# - mainブランチへのpush時に自動実行
# - GitHub Actions画面から手動実行も可能
# ─────────────────────────────────────────────
on:
  push:
    branches: [main]
  workflow_dispatch:

# ─────────────────────────────────────────────
# 環境変数（ワークフロー全体で共有）
# S3バケット名とCloudFront IDはSecretsから取得
# ─────────────────────────────────────────────
env:
  AWS_REGION: ap-northeast-1
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  CLOUDFRONT_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  # ═══════════════════════════════════════════
  # JOB 1: バックエンドデプロイ（Lambda + DynamoDB）
  # AWS SAM を使ってLambda関数とDynamoDBテーブルを
  # CloudFormation経由でデプロイする
  # ═══════════════════════════════════════════
  deploy-backend:
    name: Deploy Lambda (SAM)
    runs-on: ubuntu-latest
    steps:
      # リポジトリのコードを取得
      - uses: actions/checkout@v4

      # AWSの認証情報をGitHub Secretsから設定
      # IAMユーザーのアクセスキーを使用
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # AWS SAM CLI をインストール
      # Lambdaのビルド・デプロイに必要
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # SAMビルド
      # template.yaml を読み込んでLambdaをパッケージング
      # 成果物は .aws-sam/build/ に出力される
      - name: SAM Build
        run: sam build -t infrastructure/template.yaml

      # SAMデプロイ
      # CloudFormationスタック "fishing-ai-app" を作成 or 更新
      # --no-confirm-changeset: 変更確認をスキップして自動デプロイ
      # --no-fail-on-empty-changeset: 変更なしでもエラーにしない
      - name: SAM Deploy
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name fishing-ai-app \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --region ${{ env.AWS_REGION }}

  # ═══════════════════════════════════════════
  # JOB 2: フロントエンドデプロイ（React → S3 + CloudFront）
  # Reactをビルドして S3 にアップロード後、
  # CloudFrontのキャッシュを削除して最新版を反映する
  # バックエンドのデプロイ完了後に実行（needs指定）
  # ═══════════════════════════════════════════
  deploy-frontend:
    name: Deploy React → S3 + CloudFront
    runs-on: ubuntu-latest
    # バックエンドのデプロイ完了を待ってから実行
    needs: deploy-backend
    steps:
      # リポジトリのコードを取得
      - uses: actions/checkout@v4

      # Node.js 20 をセットアップ
      # package-lock.json をキーにしてnpmキャッシュを活用
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # npm ci でパッケージをクリーンインストール
      # npm install より厳密でCI環境に適している
      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      # Reactをプロダクションビルド
      # 環境変数はGitHub Secretsから注入
      # VITE_API_BASE_URL: API GatewayのエンドポイントURL
      # VITE_GOOGLE_MAPS_KEY: Google Maps APIキー
      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_GOOGLE_MAPS_KEY: ${{ secrets.VITE_GOOGLE_MAPS_KEY }}

      # AWSの認証情報を再設定（フロントエンドジョブ用）
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ビルド成果物をS3にアップロード
      # JS/CSS等の静的ファイル: 1年間キャッシュ（ファイル名にハッシュが入るため安全）
      # index.html のみ: キャッシュ無効（常に最新版を返すため）
      - name: Upload to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          aws s3 cp frontend/dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      # CloudFrontのキャッシュを全削除
      # これにより全ユーザーに最新のフロントエンドが配信される
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_ID }} \
            --paths "/*"