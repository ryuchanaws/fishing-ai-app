# ==============================================================
# template.yaml
#
# 釣行AIアプリ — AWS SAM テンプレート
# CloudFormation スタック名: fishing-ai-app
#
# 構成リソース:
#   - DynamoDB テーブル x4（Spots / Recommendations / Favorites / Posts）
#   - Lambda 関数 x8（API系 x6 / バッチ系 x2）
#   - API Gateway（SAM が自動生成）
#   - EventBridge スケジュール（毎日 AM6:00 JST）
#
# デプロイ:
#   sam build -t infrastructure/template.yaml
#   sam deploy --stack-name fishing-ai-app --capabilities CAPABILITY_IAM
# ==============================================================

AWSTemplateFormatVersion: "2010-09-09"

# AWS SAM 変換マクロを有効化
# SAM 独自のリソース型（AWS::Serverless::Function など）を使用するために必要
Transform: AWS::Serverless-2016-10-31

Description: Fishing AI App - Serverless Backend

# ==============================================================
# グローバル設定
# 全 Lambda 関数・API に共通して適用されるデフォルト値
# ==============================================================
Globals:
  Function:
    Runtime: python3.12   # Python ランタイムバージョン
    Timeout: 60           # デフォルトタイムアウト（秒）
    MemorySize: 256       # デフォルトメモリサイズ（MB）
    Environment:
      Variables:
        # DynamoDB テーブル名を環境変数として各 Lambda に渡す
        # !Ref で論理 ID からテーブル名を動的に取得する
        SPOTS_TABLE: !Ref SpotsTable
        RECOMMENDATIONS_TABLE: !Ref RecommendationsTable
        FAVORITES_TABLE: !Ref FavoritesTable
        POSTS_TABLE: !Ref PostsTable
        # ユーザー投稿・スポット写真のアップロード先バケット名
        UPLOADS_BUCKET: !Ref UploadsBucket
        # Gemini API キーを SSM パラメータストアから動的に取得
        # キーは手順1で登録した /fishing-ai/gemini-api-key を参照
        GEMINI_API_KEY: "/fishing-ai/gemini-api-key"
        # 手動バッチ実行 Lambda から呼び出し先 Lambda 名を参照するために設定
       #BATCH_FUNCTION_NAME: !Ref GenerateSpotScoreBatch

  Api:
    # CORS 設定（フロントエンドの S3/CloudFront からのアクセスを許可）
    Cors:
      AllowMethods: "'GET,POST,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"   # 本番環境では CloudFront ドメインに絞ることを推奨

Resources:

  # ==============================================================
  # DynamoDB テーブル定義
  # BillingMode: PAY_PER_REQUEST = リクエスト単位課金（個人利用に最適）
  # ==============================================================

  # 釣りスポットマスタ（スポットID・名称・座標・魚種など）
  SpotsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: fishing-spots
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: spotId, AttributeType: S }  # PK: スポットID（文字列）
      KeySchema:
        - { AttributeName: spotId, KeyType: HASH }     # HASH = パーティションキー

  # AI バッチが生成したスコア・推薦理由を保存するテーブル
  RecommendationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: fishing-recommendations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: spotId, AttributeType: S }  # PK: スポットID（文字列）
      KeySchema:
        - { AttributeName: spotId, KeyType: HASH }

  # ユーザーのお気に入りスポットを保存するテーブル
  # userId（PK）+ spotId（SK）の複合キーで一意性を担保
  FavoritesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: fishing-favorites
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }  # PK: ユーザーID（文字列）
        - { AttributeName: spotId, AttributeType: S }  # SK: スポットID（文字列）
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }     # HASH = パーティションキー
        - { AttributeName: spotId, KeyType: RANGE }    # RANGE = ソートキー

  # 釣果投稿を保存するテーブル
  PostsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: fishing-posts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: postId, AttributeType: S }  # PK: 投稿ID（文字列）
      KeySchema:
        - { AttributeName: postId, KeyType: HASH }

  # ==============================================================
  # S3 バケット（スポット写真・投稿写真のアップロード先）
  # 書き込みは署名付きURL経由のみ（バケットポリシーは GetObject のみ許可）
  # ==============================================================
  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "fishing-ai-app-uploads-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          # フロントの本番/開発オリジンいずれからも署名付きURLへPUTできるよう許可
          - AllowedOrigins: ["*"]
            AllowedMethods: [GET, PUT]
            AllowedHeaders: ["*"]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: false
        RestrictPublicBuckets: false

  UploadsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UploadsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${UploadsBucket.Arn}/*"

  # ==============================================================
  # Lambda 関数定義（API系）
  # CodeUri で指定したディレクトリの requirements.txt を自動インストール
  # Policies で最小権限の IAM ポリシーを付与（最小権限の原則）
  # ==============================================================

  # GET /recommendations — おすすめスポット一覧をスコア降順で返す
  GetRecommendationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: getRecommendationsHandler
      Handler: handlers.getRecommendationsHandler  # handlers.py の getRecommendationsHandler 関数
      CodeUri: ../backend/lambda/api/
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref RecommendationsTable }
        - DynamoDBReadPolicy: { TableName: !Ref SpotsTable }
      Events:
        Api:
          Type: Api
          Properties:
            Path: /recommendations
            Method: GET

  # GET /spots — 全釣りスポット一覧を返す
  GetSpotsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: getSpotsHandler
      Handler: handlers.getSpotsHandler
      CodeUri: ../backend/lambda/api/
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref SpotsTable }
      Events:
        Api:
          Type: Api
          Properties:
            Path: /spots
            Method: GET

  # GET /posts — 投稿一覧を新しい順で返す
  GetPostsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: getPostsHandler
      Handler: handlers.getPostsHandler
      CodeUri: ../backend/lambda/api/
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref PostsTable }
      Events:
        Api:
          Type: Api
          Properties:
            Path: /posts
            Method: GET

  # GET /favorites — 指定ユーザーのお気に入り一覧を返す
  GetFavoritesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: getFavoritesHandler
      Handler: handlers.getFavoritesHandler
      CodeUri: ../backend/lambda/api/
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref FavoritesTable }
        - DynamoDBReadPolicy: { TableName: !Ref SpotsTable }
      Events:
        Api:
          Type: Api
          Properties:
            Path: /favorites
            Method: GET

  # POST /favorites — お気に入りスポットを追加する
  CreateFavoriteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: createFavoriteHandler
      Handler: handlers.postFavoritesHandler
      CodeUri: ../backend/lambda/api/
      Policies:
        # CrudPolicy = Create / Read / Update / Delete 全権限
        - DynamoDBCrudPolicy: { TableName: !Ref FavoritesTable }
      Events:
        Api:
          Type: Api
          Properties:
            Path: /favorites
            Method: POST

  # DELETE /favorites/{spotId} — お気に入りスポットを削除する
  DeleteFavoriteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: deleteFavoriteHandler
      Handler: handlers.deleteFavoritesHandler
      CodeUri: ../backend/lambda/api/
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref FavoritesTable }
      Events:
        Api:
          Type: Api
          Properties:
            Path: /favorites/{spotId}
            Method: DELETE

  # POST /posts — 釣果投稿を作成する
  CreatePostFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: createPostHandler
      Handler: handlers.postPostsHandler
      CodeUri: ../backend/lambda/api/
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref PostsTable }
      Events:
        Api:
          Type: Api
          Properties:
            Path: /posts
            Method: POST

  # PUT /spots/{spotId}/image — スポットの写真URLを設定する
  UpdateSpotImageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: updateSpotImageHandler
      Handler: handlers.putSpotImageHandler
      CodeUri: ../backend/lambda/api/
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref SpotsTable }
      Events:
        Api:
          Type: Api
          Properties:
            Path: /spots/{spotId}/image
            Method: PUT

  # POST /uploads/presign — S3への直接アップロード用の署名付きURLを発行する
  PresignUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: presignUploadHandler
      Handler: handlers.postPresignUploadHandler
      CodeUri: ../backend/lambda/api/
      Policies:
        - S3WritePolicy: { BucketName: !Ref UploadsBucket }
      Events:
        Api:
          Type: Api
          Properties:
            Path: /uploads/presign
            Method: POST

  # ==============================================================
  # Lambda 関数定義（バッチ系）
  # ==============================================================

  # 全スポットのスコア計算 + Gemini API による推薦理由生成バッチ
  # Timeout: 300秒（スポット数 x Gemini API 呼び出し時間を考慮）
  # MemorySize: 512MB（大きめに設定してコールドスタートを抑制）
  GenerateSpotScoreBatch:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: generateSpotScoreBatch
      Handler: generate_score.handler
      CodeUri: ../backend/lambda/batch/
      Timeout: 300     # API系のデフォルト60秒より長く設定
      MemorySize: 512  # API系のデフォルト256MBより大きく設定
      Policies:
        - SSMParameterReadPolicy:
            # SAM の SSMParameterReadPolicy は内部で "parameter/${ParameterName}" として
            # ARN を組み立てるため、先頭にスラッシュを付けると "parameter//..." という
            # 二重スラッシュのARNになり実際のパラメータと一致しなくなる（AccessDenied の原因）。
            # そのため先頭のスラッシュを付けない。
            ParameterName: fishing-ai/gemini-api-key
        - DynamoDBReadPolicy:
            TableName: !Ref SpotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RecommendationsTable
      Events:
        # EventBridge スケジュール（毎日 AM6:00 JST = 21:00 UTC に自動実行）
        # cron 形式: cron(分 時 日 月 曜日 年)
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 21 * * ? *)
            Enabled: true

  # POST /admin/run-ai-batch — フロントの「AI実行ボタン」から手動でバッチを起動する
  # GenerateSpotScoreBatch を同期呼び出し（RequestResponse）するため
  # Timeout は GenerateSpotScoreBatch の 300秒 + バッファの 330秒に設定
  AdminRunAiBatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: adminRunAiBatch
      Handler: admin_trigger.handler
      CodeUri: ../backend/lambda/batch/
      Timeout: 330
      Environment:
        Variables:
          BATCH_FUNCTION_NAME: !Ref GenerateSpotScoreBatch
      Policies:
        # GenerateSpotScoreBatch の invoke 権限のみ付与（最小権限の原則）
        - LambdaInvokePolicy: { FunctionName: !Ref GenerateSpotScoreBatch }
      Events:
        Api:
          Type: Api
          Properties:
            Path: /admin/run-ai-batch
            Method: POST

  # 新規釣りスポット候補を Google Places API で探索し、Spots テーブルに追加するバッチ
  # 既存スポットとの重複（緯度経度が近い）は除外する
  DiscoverSpotsBatch:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: discoverSpotsBatch
      Handler: discover_spots.handler
      CodeUri: ../backend/lambda/batch/
      Timeout: 120
      MemorySize: 256
      Policies:
        - SSMParameterReadPolicy:
            # SSMParameterReadPolicy の ParameterName には先頭スラッシュを付けない
            # （付けると parameter//... という二重スラッシュARNになりAccessDeniedになる。GenerateSpotScoreBatch と同じ注意点）
            ParameterName: fishing-ai/google-places-api-key
        - SSMParameterReadPolicy:
            # 想定される魚種の推測にGemini APIも使うため、同じキーへの読み取り権限も付与
            ParameterName: fishing-ai/gemini-api-key
        - DynamoDBCrudPolicy:
            TableName: !Ref SpotsTable
      Events:
        # EventBridge スケジュール（毎週月曜 AM6:00 JST = 前日21:00 UTC に自動実行）
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 21 ? * SUN *)
            Enabled: true

  # POST /admin/run-spot-discovery — フロントから手動で DiscoverSpotsBatch を起動する
  # admin_trigger.py は BATCH_FUNCTION_NAME 環境変数で呼び出し先を切り替えられる汎用実装のため
  # AdminRunAiBatchFunction と同じハンドラコードを異なる環境変数で再利用する
  AdminRunSpotDiscoveryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: adminRunSpotDiscovery
      Handler: admin_trigger.handler
      CodeUri: ../backend/lambda/batch/
      Environment:
        Variables:
          BATCH_FUNCTION_NAME: !Ref DiscoverSpotsBatch
      Policies:
        - LambdaInvokePolicy: { FunctionName: !Ref DiscoverSpotsBatch }
      Events:
        Api:
          Type: Api
          Properties:
            Path: /admin/run-spot-discovery
            Method: POST

# ==============================================================
# スタック出力
# SAM デプロイ後にコンソールや GitHub Secrets に設定する値
# ==============================================================
Outputs:
  ApiEndpoint:
    Description: "API Gateway のエンドポイント URL（VITE_API_BASE_URL に設定すること）"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  UploadsBucketName:
    Description: "スポット写真・投稿写真のアップロード先S3バケット名"
    Value: !Ref UploadsBucket