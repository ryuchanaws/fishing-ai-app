AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Fishing AI App - Serverless Backend
Globals:
  Function:
    Runtime: python3.12
    Timeout: 60
    MemorySize: 256
    Environment:
      Variables:
        SPOTS_TABLE:
          Ref: SpotsTable
        RECOMMENDATIONS_TABLE:
          Ref: RecommendationsTable
        FAVORITES_TABLE:
          Ref: FavoritesTable
        POSTS_TABLE:
          Ref: PostsTable
        GEMINI_API_KEY: /fishing-ai/gemini-api-key
  Api:
    Cors:
      AllowMethods: '''GET,POST,DELETE,OPTIONS'''
      AllowHeaders: '''Content-Type,Authorization'''
      AllowOrigin: '''*'''
Resources:
  SpotsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: fishing-spots
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: spotId
        AttributeType: S
      KeySchema:
      - AttributeName: spotId
        KeyType: HASH
  RecommendationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: fishing-recommendations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: spotId
        AttributeType: S
      KeySchema:
      - AttributeName: spotId
        KeyType: HASH
  FavoritesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: fishing-favorites
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      - AttributeName: spotId
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
      - AttributeName: spotId
        KeyType: RANGE
  PostsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: fishing-posts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: postId
        AttributeType: S
      KeySchema:
      - AttributeName: postId
        KeyType: HASH
  GetRecommendationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: getRecommendationsHandler
      Handler: handlers.get_recommendations
      CodeUri: GetRecommendationsFunction
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: RecommendationsTable
      - DynamoDBReadPolicy:
          TableName:
            Ref: SpotsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /recommendations
            Method: GET
    Metadata:
      SamResourceId: GetRecommendationsFunction
  GetSpotsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: getSpotsHandler
      Handler: handlers.get_spots
      CodeUri: GetSpotsFunction
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: SpotsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /spots
            Method: GET
    Metadata:
      SamResourceId: GetSpotsFunction
  GetPostsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: getPostsHandler
      Handler: handlers.get_posts
      CodeUri: GetPostsFunction
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: PostsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /posts
            Method: GET
    Metadata:
      SamResourceId: GetPostsFunction
  GetFavoritesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: getFavoritesHandler
      Handler: handlers.get_favorites
      CodeUri: GetFavoritesFunction
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: FavoritesTable
      - DynamoDBReadPolicy:
          TableName:
            Ref: SpotsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /favorites
            Method: GET
    Metadata:
      SamResourceId: GetFavoritesFunction
  CreateFavoriteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: createFavoriteHandler
      Handler: handlers.create_favorite
      CodeUri: CreateFavoriteFunction
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FavoritesTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /favorites
            Method: POST
    Metadata:
      SamResourceId: CreateFavoriteFunction
  DeleteFavoriteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: deleteFavoriteHandler
      Handler: handlers.delete_favorite
      CodeUri: DeleteFavoriteFunction
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FavoritesTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /favorites/{spotId}
            Method: DELETE
    Metadata:
      SamResourceId: DeleteFavoriteFunction
  GenerateSpotScoreBatch:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: generateSpotScoreBatch
      Handler: generate_score.handler
      CodeUri: GenerateSpotScoreBatch
      Timeout: 300
      MemorySize: 512
      Policies:
      - SSMParameterReadPolicy:
          ParameterName: /fishing-ai/gemini-api-key
      - DynamoDBReadPolicy:
          TableName:
            Ref: SpotsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: RecommendationsTable
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 21 * * ? *)
            Enabled: true
    Metadata:
      SamResourceId: GenerateSpotScoreBatch
  AdminRunAiBatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: adminRunAiBatch
      Handler: admin_trigger.handler
      CodeUri: AdminRunAiBatchFunction
      Timeout: 330
      Policies:
      - LambdaInvokePolicy:
          FunctionName:
            Ref: GenerateSpotScoreBatch
      Events:
        Api:
          Type: Api
          Properties:
            Path: /admin/run-ai-batch
            Method: POST
    Metadata:
      SamResourceId: AdminRunAiBatchFunction
Outputs:
  ApiEndpoint:
    Description: "API Gateway \u306E\u30A8\u30F3\u30C9\u30DD\u30A4\u30F3\u30C8 URL\uFF08\
      VITE_API_BASE_URL \u306B\u8A2D\u5B9A\u3059\u308B\u3053\u3068\uFF09"
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/dev
